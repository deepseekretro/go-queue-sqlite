<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoQueue — 定时任务示例</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0f172a;
    --surface:   #1e293b;
    --border:    #334155;
    --text:      #e2e8f0;
    --muted:     #94a3b8;
    --accent:    #6366f1;
    --accent-h:  #4f46e5;
    --green:     #22c55e;
    --red:       #ef4444;
    --yellow:    #f59e0b;
    --cyan:      #06b6d4;
  }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 48px;
  }

  /* ── 顶部标题 ── */
  .page-header {
    max-width: 960px;
    margin: 0 auto 28px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .page-header .logo {
    width: 42px; height: 42px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .page-header h1 { font-size: 22px; font-weight: 700; }
  .page-header p  { font-size: 13px; color: var(--muted); margin-top: 2px; }

  /* ── 服务器配置栏 ── */
  .config-bar {
    max-width: 960px;
    margin: 0 auto 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    display: flex;
    gap: 12px;
    align-items: flex-end;
    flex-wrap: wrap;
  }
  .config-bar .field { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 180px; }
  .config-bar label  { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  .config-bar input  {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    padding: 7px 10px;
    font-size: 13px;
    outline: none;
    transition: border-color .15s;
  }
  .config-bar input:focus { border-color: var(--accent); }

  /* ── 主布局 ── */
  .layout {
    max-width: 960px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  @media (max-width: 680px) { .layout { grid-template-columns: 1fr; } }

  /* ── 卡片 ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .card-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .card-header h2 { font-size: 14px; font-weight: 600; }
  .card-body { padding: 18px; }

  /* ── 表单 ── */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-grid .full { grid-column: 1 / -1; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  .field input, .field select, .field textarea {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    padding: 7px 10px;
    font-size: 13px;
    outline: none;
    transition: border-color .15s;
    font-family: inherit;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 72px; }
  .field select option { background: var(--surface); }

  /* ── 按钮 ── */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px;
    border-radius: 7px;
    border: none;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background .15s, opacity .15s;
  }
  .btn:disabled { opacity: .45; cursor: not-allowed; }
  .btn-primary  { background: var(--accent); color: #fff; }
  .btn-primary:hover:not(:disabled)  { background: var(--accent-h); }
  .btn-danger   { background: #7f1d1d; color: #fca5a5; }
  .btn-danger:hover:not(:disabled)   { background: #991b1b; }
  .btn-ghost    { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover:not(:disabled)    { background: var(--border); color: var(--text); }
  .btn-sm { padding: 4px 10px; font-size: 12px; }

  /* ── 状态徽章 ── */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge-green  { background: #14532d; color: var(--green); }
  .badge-red    { background: #7f1d1d; color: var(--red); }
  .badge-yellow { background: #78350f; color: var(--yellow); }
  .badge-gray   { background: #1e293b; color: var(--muted); border: 1px solid var(--border); }
  .badge-cyan   { background: #164e63; color: var(--cyan); }

  /* ── Cron 列表 ── */
  .cron-list { display: flex; flex-direction: column; gap: 10px; }
  .cron-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 12px 14px;
  }
  .cron-item-top {
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    margin-bottom: 6px;
  }
  .cron-item-name { font-size: 13px; font-weight: 600; }
  .cron-item-meta { font-size: 11px; color: var(--muted); display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
  .cron-item-meta span { display: flex; align-items: center; gap: 3px; }
  .cron-actions { display: flex; gap: 6px; align-items: center; }

  /* ── 日志 ── */
  .log-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 10px 12px;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
    font-size: 12px;
    line-height: 1.7;
    height: 260px;
    overflow-y: auto;
    color: var(--muted);
  }
  .log-box .log-line { display: flex; gap: 8px; }
  .log-box .log-time { color: #475569; flex-shrink: 0; }
  .log-box .log-ok   { color: var(--green); }
  .log-box .log-err  { color: var(--red); }
  .log-box .log-info { color: var(--cyan); }
  .log-box .log-warn { color: var(--yellow); }

  /* ── 统计卡片 ── */
  .stats-row {
    max-width: 960px;
    margin: 0 auto 20px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }
  @media (max-width: 680px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .stat-card .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  .stat-card .stat-value { font-size: 26px; font-weight: 700; margin-top: 4px; }
  .stat-card .stat-value.green  { color: var(--green); }
  .stat-card .stat-value.yellow { color: var(--yellow); }
  .stat-card .stat-value.red    { color: var(--red); }
  .stat-card .stat-value.cyan   { color: var(--cyan); }

  /* ── 空状态 ── */
  .empty { text-align: center; padding: 32px 0; color: var(--muted); font-size: 13px; }
  .empty .empty-icon { font-size: 32px; margin-bottom: 8px; }

  /* ── Toast ── */
  #toast-container {
    position: fixed; bottom: 24px; right: 24px;
    display: flex; flex-direction: column; gap: 8px;
    z-index: 9999;
  }
  .toast {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 10px 16px;
    font-size: 13px;
    box-shadow: 0 8px 24px rgba(0,0,0,.4);
    animation: slideIn .2s ease;
    max-width: 320px;
  }
  .toast.ok  { border-left: 3px solid var(--green); }
  .toast.err { border-left: 3px solid var(--red); }
  @keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: none; opacity: 1; } }

  /* ── 分隔线 ── */
  hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

  /* ── 全宽卡片 ── */
  .full-card { max-width: 960px; margin: 0 auto 20px; }

  /* ── 连接状态指示 ── */
  .conn-dot {
    width: 8px; height: 8px; border-radius: 50%;
    display: inline-block; margin-right: 4px;
  }
  .conn-dot.ok  { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .conn-dot.err { background: var(--red); }
  .conn-dot.idle { background: var(--yellow); }
</style>
</head>
<body>

<!-- ── 顶部标题 ── -->
<div class="page-header">
  <div class="logo">⏰</div>
  <div>
    <h1>GoQueue — 定时任务示例</h1>
    <p>通过浏览器 JS 管理 Cron 定时任务：创建、启停、删除，并实时查看触发日志</p>
  </div>
</div>

<!-- ── 服务器配置栏 ── -->
<div class="config-bar">
  <div class="field">
    <label>服务端地址</label>
    <input id="cfg-server" type="text" value="https://24f7f8fe-1114-4510-9f39-bdbd913f8772.deepnoteproject.com" placeholder="http://localhost:8080">
  </div>
  <div class="field">
    <label>API Key（可选）</label>
    <input id="cfg-apikey" type="text" placeholder="留空则不鉴权">
  </div>
  <button class="btn btn-primary" onclick="applyConfig()">✓ 应用配置</button>
  <span id="conn-status" style="font-size:12px;color:var(--muted);white-space:nowrap">
    <span class="conn-dot idle" id="conn-dot"></span>未连接
  </span>
</div>

<!-- ── 统计行 ── -->
<div class="stats-row">
  <div class="stat-card">
    <div class="stat-label">定时任务总数</div>
    <div class="stat-value cyan" id="stat-total">—</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">已启用</div>
    <div class="stat-value green" id="stat-enabled">—</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">已暂停</div>
    <div class="stat-value yellow" id="stat-disabled">—</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">本页触发次数</div>
    <div class="stat-value" id="stat-fired">0</div>
  </div>
</div>

<!-- ── 主布局 ── -->
<div class="layout">

  <!-- 左：创建定时任务 -->
  <div class="card">
    <div class="card-header">
      <h2>➕ 创建定时任务</h2>
    </div>
    <div class="card-body">
      <div class="form-grid">
        <div class="field full">
          <label>任务名称</label>
          <input id="f-name" type="text" placeholder="例：每分钟心跳检测" value="每分钟心跳检测">
        </div>
        <div class="field">
          <label>队列名</label>
          <input id="f-queue" type="text" placeholder="default" value="default">
        </div>
        <div class="field">
          <label>Job Type</label>
          <input id="f-jobtype" type="text" placeholder="例：heartbeat" value="heartbeat">
        </div>
        <div class="field">
          <label>执行间隔（every）</label>
          <select id="f-every">
            <option value="10s">每 10 秒</option>
            <option value="30s">每 30 秒</option>
            <option value="1m" selected>每 1 分钟</option>
            <option value="5m">每 5 分钟</option>
            <option value="15m">每 15 分钟</option>
            <option value="30m">每 30 分钟</option>
            <option value="1h">每 1 小时</option>
            <option value="6h">每 6 小时</option>
            <option value="1d">每 1 天</option>
            <option value="custom">自定义…</option>
          </select>
        </div>
        <div class="field" id="custom-every-wrap" style="display:none">
          <label>自定义间隔</label>
          <input id="f-every-custom" type="text" placeholder="例：45s / 2h / 3d">
        </div>
        <div class="field">
          <label>优先级（1-10）</label>
          <input id="f-priority" type="number" min="1" max="10" value="5">
        </div>
        <div class="field">
          <label>最大重试次数</label>
          <input id="f-maxattempts" type="number" min="1" max="10" value="3">
        </div>
        <div class="field full">
          <label>Data（JSON）</label>
          <textarea id="f-data" placeholder='{"key": "value"}'>{}</textarea>
        </div>
      </div>
      <hr>
      <!-- 快速模板 -->
      <div style="margin-bottom:12px">
        <div style="font-size:11px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em">快速模板</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          <button class="btn btn-ghost btn-sm" onclick="applyTemplate('heartbeat')">💓 心跳检测</button>
          <button class="btn btn-ghost btn-sm" onclick="applyTemplate('report')">📊 生成报告</button>
          <button class="btn btn-ghost btn-sm" onclick="applyTemplate('cleanup')">🧹 数据清理</button>
          <button class="btn btn-ghost btn-sm" onclick="applyTemplate('sync')">🔄 数据同步</button>
          <button class="btn btn-ghost btn-sm" onclick="applyTemplate('notify')">🔔 定时通知</button>
        </div>
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="createCron()">
        ⏰ 创建定时任务
      </button>
    </div>
  </div>

  <!-- 右：实时触发日志 -->
  <div class="card">
    <div class="card-header">
      <h2>📋 实时触发日志</h2>
      <div style="display:flex;gap:8px;align-items:center">
        <span id="sse-badge" class="badge badge-gray">SSE 未连接</span>
        <button class="btn btn-ghost btn-sm" onclick="clearLog()">清空</button>
      </div>
    </div>
    <div class="card-body" style="padding:12px">
      <div class="log-box" id="log-box">
        <div class="log-line"><span class="log-time">--:--:--</span><span class="log-info">等待服务端事件…点击「应用配置」开始监听</span></div>
      </div>
    </div>
  </div>

</div>

<!-- ── 定时任务列表（全宽） ── -->
<div class="full-card">
  <div class="card">
    <div class="card-header">
      <h2>📅 定时任务列表</h2>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost btn-sm" onclick="loadCrons()">🔄 刷新</button>
        <button class="btn btn-danger btn-sm" onclick="deleteAllCrons()">🗑 全部删除</button>
      </div>
    </div>
    <div class="card-body">
      <div class="cron-list" id="cron-list">
        <div class="empty"><div class="empty-icon">📭</div>暂无定时任务，请先创建</div>
      </div>
    </div>
  </div>
</div>

<!-- ── Toast 容器 ── -->
<div id="toast-container"></div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  配置
// ═══════════════════════════════════════════════════════════════════
let SERVER  = 'https://24f7f8fe-1114-4510-9f39-bdbd913f8772.deepnoteproject.com';
let API_KEY = '';
let sseSource = null;
let firedCount = 0;

// ═══════════════════════════════════════════════════════════════════
//  工具函数
// ═══════════════════════════════════════════════════════════════════
function headers() {
  const h = { 'Content-Type': 'application/json' };
  if (API_KEY) h['X-API-Key'] = API_KEY;
  return h;
}

function toast(msg, type = 'ok') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function now() {
  return new Date().toLocaleTimeString('zh-CN', { hour12: false });
}

function addLog(text, cls = 'log-info') {
  const box = document.getElementById('log-box');
  // 移除初始占位行
  const placeholder = box.querySelector('.log-line');
  if (placeholder && placeholder.querySelector('.log-info')?.textContent.startsWith('等待')) {
    placeholder.remove();
  }
  const line = document.createElement('div');
  line.className = 'log-line';
  line.innerHTML = `<span class="log-time">${now()}</span><span class="${cls}">${escHtml(text)}</span>`;
  box.appendChild(line);
  // 最多保留 200 行
  while (box.children.length > 200) box.removeChild(box.firstChild);
  box.scrollTop = box.scrollHeight;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function clearLog() {
  document.getElementById('log-box').innerHTML = '';
  addLog('日志已清空', 'log-info');
}

function fmtDuration(every) {
  const map = { s: '秒', m: '分钟', h: '小时', d: '天', w: '周' };
  const m = every.match(/^(\d+)([smhdw])$/);
  if (m) return `每 ${m[1]} ${map[m[2]] || m[2]}`;
  return `每 ${every}`;
}

function fmtTs(ts) {
  if (!ts || ts === 0) return '—';
  return new Date(ts * 1000).toLocaleString('zh-CN');
}

function fmtNextRun(ts) {
  if (!ts || ts === 0) return '—';
  const diff = ts - Math.floor(Date.now() / 1000);
  if (diff <= 0) return '即将触发';
  if (diff < 60) return `${diff}s 后`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ${diff%60}s 后`;
  return `${Math.floor(diff/3600)}h ${Math.floor((diff%3600)/60)}m 后`;
}

// ═══════════════════════════════════════════════════════════════════
//  配置应用
// ═══════════════════════════════════════════════════════════════════
function applyConfig() {
  SERVER  = document.getElementById('cfg-server').value.replace(/\/$/, '');
  API_KEY = document.getElementById('cfg-apikey').value.trim();
  setConnStatus('connecting');
  addLog(`连接到服务端: ${SERVER}`, 'log-info');
  loadCrons();
  connectSSE();
}

function setConnStatus(state) {
  const dot  = document.getElementById('conn-dot');
  const span = document.getElementById('conn-status');
  if (state === 'ok') {
    dot.className = 'conn-dot ok';
    span.innerHTML = '<span class="conn-dot ok" id="conn-dot"></span>已连接';
  } else if (state === 'err') {
    dot.className = 'conn-dot err';
    span.innerHTML = '<span class="conn-dot err" id="conn-dot"></span>连接失败';
  } else {
    dot.className = 'conn-dot idle';
    span.innerHTML = '<span class="conn-dot idle" id="conn-dot"></span>连接中…';
  }
}

// ═══════════════════════════════════════════════════════════════════
//  SSE 实时事件
// ═══════════════════════════════════════════════════════════════════
function connectSSE() {
  if (sseSource) { sseSource.close(); sseSource = null; }

  // SSE 需要 session cookie，先尝试 /api/stats 检测连通性
  fetch(`${SERVER}/api/stats`, { headers: headers() })
    .then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      setConnStatus('ok');
      addLog('服务端连接成功 ✓', 'log-ok');
      // 启动轮询（SSE 需要 session，这里用轮询模拟实时刷新）
      startPolling();
    })
    .catch(e => {
      setConnStatus('err');
      addLog(`连接失败: ${e.message}`, 'log-err');
      toast(`连接失败: ${e.message}`, 'err');
    });
}

let pollTimer = null;
let lastCronSnapshot = '';

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  document.getElementById('sse-badge').className = 'badge badge-green';
  document.getElementById('sse-badge').textContent = '轮询中 ✓';
  // 每 5 秒刷新一次 cron 列表，检测触发情况
  pollTimer = setInterval(() => {
    loadCrons(true); // silent=true，不打日志
  }, 5000);
}

// ═══════════════════════════════════════════════════════════════════
//  API 调用
// ═══════════════════════════════════════════════════════════════════

// 加载 cron 列表
async function loadCrons(silent = false) {
  try {
    const r = await fetch(`${SERVER}/api/crons`, { headers: headers() });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const crons = await r.json();
    renderCrons(crons, silent);
    updateStats(crons);
    if (!silent) addLog(`已加载 ${crons.length} 个定时任务`, 'log-info');
  } catch (e) {
    if (!silent) {
      addLog(`加载失败: ${e.message}`, 'log-err');
      toast(`加载失败: ${e.message}`, 'err');
    }
  }
}

// 创建 cron
async function createCron() {
  const name        = document.getElementById('f-name').value.trim();
  const queue       = document.getElementById('f-queue').value.trim() || 'default';
  const jobType     = document.getElementById('f-jobtype').value.trim();
  const everySelect = document.getElementById('f-every').value;
  const every       = everySelect === 'custom'
    ? document.getElementById('f-every-custom').value.trim()
    : everySelect;
  const priority    = parseInt(document.getElementById('f-priority').value) || 5;
  const maxAttempts = parseInt(document.getElementById('f-maxattempts').value) || 3;
  const dataRaw     = document.getElementById('f-data').value.trim() || '{}';

  if (!jobType) { toast('请填写 Job Type', 'err'); return; }
  if (!every)   { toast('请选择执行间隔', 'err'); return; }

  let data;
  try { data = JSON.parse(dataRaw); }
  catch (e) { toast('Data 不是合法 JSON', 'err'); return; }

  const body = { name, queue, job_type: jobType, every, priority, max_attempts: maxAttempts, data };

  try {
    const r = await fetch(`${SERVER}/api/crons`, {
      method: 'POST',
      headers: headers(),
      body: JSON.stringify(body),
    });
    const json = await r.json();
    if (!r.ok) throw new Error(json.error || `HTTP ${r.status}`);
    toast(`✓ 定时任务已创建 #${json.id}`, 'ok');
    addLog(`创建定时任务 #${json.id} [${jobType}] ${fmtDuration(every)}`, 'log-ok');
    loadCrons();
  } catch (e) {
    toast(`创建失败: ${e.message}`, 'err');
    addLog(`创建失败: ${e.message}`, 'log-err');
  }
}

// 切换启用/禁用
async function toggleCron(id, currentEnabled) {
  const enabled = !currentEnabled;
  try {
    const r = await fetch(`${SERVER}/api/crons/${id}`, {
      method: 'PATCH',
      headers: headers(),
      body: JSON.stringify({ enabled }),
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    toast(enabled ? `✓ 已启用 #${id}` : `⏸ 已暂停 #${id}`, 'ok');
    addLog(`${enabled ? '启用' : '暂停'} 定时任务 #${id}`, enabled ? 'log-ok' : 'log-warn');
    loadCrons();
  } catch (e) {
    toast(`操作失败: ${e.message}`, 'err');
  }
}

// 删除单个 cron
async function deleteCron(id, name) {
  if (!confirm(`确认删除定时任务「${name}」(#${id})？`)) return;
  try {
    const r = await fetch(`${SERVER}/api/crons/${id}`, {
      method: 'DELETE',
      headers: headers(),
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    toast(`✓ 已删除 #${id}`, 'ok');
    addLog(`删除定时任务 #${id} [${name}]`, 'log-warn');
    loadCrons();
  } catch (e) {
    toast(`删除失败: ${e.message}`, 'err');
  }
}

// 删除全部 cron
async function deleteAllCrons() {
  if (!confirm('确认删除所有定时任务？此操作不可撤销。')) return;
  try {
    const r = await fetch(`${SERVER}/api/crons`, { headers: headers() });
    const crons = await r.json();
    if (!crons.length) { toast('没有可删除的定时任务', 'ok'); return; }
    await Promise.all(crons.map(c =>
      fetch(`${SERVER}/api/crons/${c.id}`, { method: 'DELETE', headers: headers() })
    ));
    toast(`✓ 已删除 ${crons.length} 个定时任务`, 'ok');
    addLog(`批量删除 ${crons.length} 个定时任务`, 'log-warn');
    loadCrons();
  } catch (e) {
    toast(`删除失败: ${e.message}`, 'err');
  }
}

// 立即触发一次（手动投递一个任务）
async function fireCronNow(id, queue, jobType, dataStr) {
  let data;
  try { data = JSON.parse(dataStr || '{}'); } catch { data = {}; }
  const body = { queue, job_type: jobType, data };
  try {
    const r = await fetch(`${SERVER}/api/jobs`, {
      method: 'POST',
      headers: headers(),
      body: JSON.stringify(body),
    });
    const json = await r.json();
    if (!r.ok) throw new Error(json.error || `HTTP ${r.status}`);
    firedCount++;
    document.getElementById('stat-fired').textContent = firedCount;
    toast(`✓ 已手动触发 → job #${json.job_id}`, 'ok');
    addLog(`手动触发 cron #${id} [${jobType}] → job #${json.job_id}`, 'log-ok');
  } catch (e) {
    toast(`触发失败: ${e.message}`, 'err');
    addLog(`触发失败: ${e.message}`, 'log-err');
  }
}

// ═══════════════════════════════════════════════════════════════════
//  渲染
// ═══════════════════════════════════════════════════════════════════
function renderCrons(crons, silent) {
  const list = document.getElementById('cron-list');

  // 检测触发（last_run_at 变化）
  const snapshot = JSON.stringify(crons.map(c => ({ id: c.id, last: c.last_run_at })));
  if (lastCronSnapshot && snapshot !== lastCronSnapshot) {
    const prev = JSON.parse(lastCronSnapshot);
    crons.forEach(c => {
      const p = prev.find(x => x.id === c.id);
      if (p && c.last_run_at > p.last) {
        firedCount++;
        document.getElementById('stat-fired').textContent = firedCount;
        addLog(`⏰ Cron #${c.id} [${c.job_type}] 已触发 → 上次: ${fmtTs(c.last_run_at)}`, 'log-ok');
      }
    });
  }
  lastCronSnapshot = snapshot;

  if (!crons.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>暂无定时任务，请先创建</div>';
    return;
  }

  list.innerHTML = crons.map(c => {
    const enabled = c.enabled;
    const statusBadge = enabled
      ? '<span class="badge badge-green">● 运行中</span>'
      : '<span class="badge badge-yellow">⏸ 已暂停</span>';
    const toggleLabel = enabled ? '⏸ 暂停' : '▶ 启用';
    const dataPreview = c.data && c.data !== '{}' ? c.data.substring(0, 40) + (c.data.length > 40 ? '…' : '') : '{}';

    return `
    <div class="cron-item">
      <div class="cron-item-top">
        <div style="display:flex;align-items:center;gap:8px">
          ${statusBadge}
          <span class="cron-item-name">${escHtml(c.name || c.job_type)}</span>
          <span class="badge badge-cyan">${escHtml(fmtDuration(c.every))}</span>
        </div>
        <div class="cron-actions">
          <button class="btn btn-ghost btn-sm" onclick="fireCronNow(${c.id}, '${escHtml(c.queue)}', '${escHtml(c.job_type)}', ${JSON.stringify(c.data)})">
            ▶ 立即触发
          </button>
          <button class="btn btn-ghost btn-sm" onclick="toggleCron(${c.id}, ${enabled})">
            ${toggleLabel}
          </button>
          <button class="btn btn-danger btn-sm" onclick="deleteCron(${c.id}, '${escHtml(c.name || c.job_type)}')">
            🗑
          </button>
        </div>
      </div>
      <div class="cron-item-meta">
        <span>🆔 #${c.id}</span>
        <span>📌 队列: <b>${escHtml(c.queue)}</b></span>
        <span>🔧 类型: <b>${escHtml(c.job_type)}</b></span>
        <span>⚡ 优先级: ${c.priority}</span>
        <span>🔁 最大重试: ${c.max_attempts}</span>
        <span>📦 Data: <code style="font-size:10px;color:var(--cyan)">${escHtml(dataPreview)}</code></span>
      </div>
      <div class="cron-item-meta" style="margin-top:6px;padding-top:6px;border-top:1px solid var(--border)">
        <span>🕐 上次触发: ${fmtTs(c.last_run_at)}</span>
        <span>⏭ 下次触发: <b style="color:var(--cyan)">${fmtNextRun(c.next_run_at)}</b></span>
        <span>📅 创建时间: ${fmtTs(c.created_at)}</span>
      </div>
    </div>`;
  }).join('');
}

function updateStats(crons) {
  const total   = crons.length;
  const enabled = crons.filter(c => c.enabled).length;
  document.getElementById('stat-total').textContent   = total;
  document.getElementById('stat-enabled').textContent = enabled;
  document.getElementById('stat-disabled').textContent = total - enabled;
}

// ═══════════════════════════════════════════════════════════════════
//  快速模板
// ═══════════════════════════════════════════════════════════════════
const TEMPLATES = {
  heartbeat: {
    name: '心跳检测',
    queue: 'default',
    jobType: 'heartbeat',
    every: '1m',
    priority: 5,
    maxAttempts: 1,
    data: '{"check": "ping"}',
  },
  report: {
    name: '每日报告生成',
    queue: 'reports',
    jobType: 'generate_report',
    every: '1h',
    priority: 3,
    maxAttempts: 3,
    data: '{"type": "daily", "format": "pdf"}',
  },
  cleanup: {
    name: '过期数据清理',
    queue: 'maintenance',
    jobType: 'cleanup_expired',
    every: '6h',
    priority: 2,
    maxAttempts: 2,
    data: '{"older_than_days": 30, "tables": ["logs", "sessions"]}',
  },
  sync: {
    name: '数据同步',
    queue: 'sync',
    jobType: 'data_sync',
    every: '5m',
    priority: 7,
    maxAttempts: 5,
    data: '{"source": "api", "target": "db", "batch_size": 100}',
  },
  notify: {
    name: '定时通知推送',
    queue: 'notifications',
    jobType: 'push_notification',
    every: '30m',
    priority: 6,
    maxAttempts: 3,
    data: '{"channel": "all", "template": "reminder"}',
  },
};

function applyTemplate(key) {
  const t = TEMPLATES[key];
  if (!t) return;
  document.getElementById('f-name').value        = t.name;
  document.getElementById('f-queue').value       = t.queue;
  document.getElementById('f-jobtype').value     = t.jobType;
  document.getElementById('f-priority').value    = t.priority;
  document.getElementById('f-maxattempts').value = t.maxAttempts;
  document.getElementById('f-data').value        = t.data;

  const sel = document.getElementById('f-every');
  const opt = [...sel.options].find(o => o.value === t.every);
  if (opt) {
    sel.value = t.every;
    document.getElementById('custom-every-wrap').style.display = 'none';
  } else {
    sel.value = 'custom';
    document.getElementById('custom-every-wrap').style.display = '';
    document.getElementById('f-every-custom').value = t.every;
  }
  toast(`已应用模板：${t.name}`, 'ok');
}

// ═══════════════════════════════════════════════════════════════════
//  事件绑定
// ═══════════════════════════════════════════════════════════════════
document.getElementById('f-every').addEventListener('change', function () {
  document.getElementById('custom-every-wrap').style.display =
    this.value === 'custom' ? '' : 'none';
});

window.addEventListener('DOMContentLoaded', () => {
  addLog('页面已加载，点击「应用配置」连接服务端', 'log-info');
});
</script>
