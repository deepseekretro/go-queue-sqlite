<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoQueue — 定时任务 Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0f172a;
    --surface:   #1e293b;
    --surface2:  #263348;
    --border:    #334155;
    --text:      #e2e8f0;
    --muted:     #94a3b8;
    --accent:    #6366f1;
    --accent-h:  #4f46e5;
    --green:     #22c55e;
    --red:       #ef4444;
    --yellow:    #f59e0b;
    --cyan:      #06b6d4;
    --purple:    #a855f7;
    --orange:    #f97316;
  }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── 顶栏 ── */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-brand { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .topbar-brand span { color: var(--accent); }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .conn-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .conn-dot.ok   { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .conn-dot.err  { background: var(--red); }
  .conn-dot.idle { background: var(--muted); }
  #conn-label { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }

  /* ── 主布局 ── */
  .page { max-width: 1280px; margin: 0 auto; padding: 24px 20px; }

  /* ── 配置栏 ── */
  .config-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .config-bar label { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .config-bar input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    padding: 6px 10px;
    font-size: 13px;
    flex: 1;
    min-width: 180px;
  }
  .config-bar input:focus { outline: none; border-color: var(--accent); }

  /* ── 统计卡片 ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }
  @media (max-width: 900px) { .stats-row { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 560px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .stat-card .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  .stat-card .stat-value { font-size: 24px; font-weight: 700; margin-top: 4px; }
  .stat-card .stat-value.green  { color: var(--green); }
  .stat-card .stat-value.yellow { color: var(--yellow); }
  .stat-card .stat-value.red    { color: var(--red); }
  .stat-card .stat-value.cyan   { color: var(--cyan); }
  .stat-card .stat-value.purple { color: var(--purple); }
  .stat-card .stat-value.orange { color: var(--orange); }

  /* ── 两栏布局 ── */
  .layout {
    display: grid;
    grid-template-columns: 420px 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }
  @media (max-width: 860px) { .layout { grid-template-columns: 1fr; } }

  /* ── 卡片 ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .card-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-weight: 600;
    font-size: 14px;
  }
  .card-body { padding: 18px; }

  /* ── 表单 ── */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field.full { grid-column: 1 / -1; }
  .field label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  .field input, .field select, .field textarea {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    padding: 7px 10px;
    font-size: 13px;
    font-family: inherit;
    transition: border-color .15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .field textarea { resize: vertical; min-height: 60px; }
  .field select option { background: var(--surface); }

  /* 调度模式切换 */
  .schedule-tabs {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 7px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .schedule-tab {
    flex: 1;
    padding: 7px 0;
    text-align: center;
    font-size: 12px;
    cursor: pointer;
    background: var(--bg);
    color: var(--muted);
    border: none;
    transition: background .15s, color .15s;
  }
  .schedule-tab.active {
    background: var(--accent);
    color: #fff;
    font-weight: 600;
  }

  /* 复选框行 */
  .check-row {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    margin-bottom: 12px;
  }
  .check-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
  }
  .check-item input[type=checkbox] { accent-color: var(--accent); width: 14px; height: 14px; cursor: pointer; }

  /* 模板按钮 */
  .tpl-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }

  /* ── 按钮 ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 8px 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: opacity .15s, transform .1s;
    white-space: nowrap;
  }
  .btn:active { transform: scale(.97); }
  .btn-primary  { background: var(--accent); color: #fff; }
  .btn-primary:hover  { background: var(--accent-h); }
  .btn-ghost   { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover   { color: var(--text); border-color: var(--muted); }
  .btn-danger  { background: transparent; color: var(--red); border: 1px solid var(--red); }
  .btn-danger:hover  { background: var(--red); color: #fff; }
  .btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 6px; }
  .btn-icon { padding: 5px 8px; font-size: 13px; border-radius: 6px; }

  /* ── 徽章 ── */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }
  .badge-green  { background: rgba(34,197,94,.15);  color: var(--green); }
  .badge-yellow { background: rgba(245,158,11,.15); color: var(--yellow); }
  .badge-red    { background: rgba(239,68,68,.15);  color: var(--red); }
  .badge-gray   { background: rgba(148,163,184,.1); color: var(--muted); }
  .badge-cyan   { background: rgba(6,182,212,.15);  color: var(--cyan); }
  .badge-purple { background: rgba(168,85,247,.15); color: var(--purple); }
  .badge-orange { background: rgba(249,115,22,.15); color: var(--orange); }

  /* ── 定时任务列表 ── */
  .cron-list { display: flex; flex-direction: column; gap: 10px; }
  .cron-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    transition: border-color .2s;
  }
  .cron-item:hover { border-color: var(--accent); }
  .cron-item.disabled { opacity: .55; }
  .cron-item.fired {
    animation: flashGreen .6s ease;
  }
  @keyframes flashGreen {
    0%   { border-color: var(--green); box-shadow: 0 0 12px rgba(34,197,94,.4); }
    100% { border-color: var(--border); box-shadow: none; }
  }

  .cron-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 8px;
  }
  .cron-title {
    font-weight: 600;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .cron-id { font-size: 11px; color: var(--muted); font-weight: 400; }
  .cron-actions { display: flex; gap: 6px; flex-shrink: 0; }

  .cron-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 14px;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .cron-meta span { display: flex; align-items: center; gap: 4px; }
  .cron-meta .val { color: var(--text); }

  .cron-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; }
  .tag-chip {
    background: rgba(99,102,241,.15);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 7px;
    font-size: 11px;
  }

  .cron-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
    border-top: 1px solid var(--border);
    padding-top: 8px;
    margin-top: 4px;
  }
  .cron-footer .progress-bar-wrap {
    flex: 1;
    min-width: 80px;
    max-width: 160px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .cron-footer .progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width .3s;
  }

  /* ── 日志面板 ── */
  .log-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 10px 12px;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
    font-size: 12px;
    line-height: 1.7;
    height: 280px;
    overflow-y: auto;
    color: var(--muted);
  }
  .log-box .log-line { display: flex; gap: 8px; }
  .log-box .log-time { color: #475569; flex-shrink: 0; }
  .log-box .log-ok   { color: var(--green); }
  .log-box .log-err  { color: var(--red); }
  .log-box .log-info { color: var(--cyan); }
  .log-box .log-warn { color: var(--yellow); }

  /* ── 触发历史抽屉 ── */
  .drawer-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.5);
    z-index: 200;
  }
  .drawer-overlay.open { display: flex; align-items: flex-end; justify-content: center; }
  .drawer {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    width: 100%;
    max-width: 760px;
    max-height: 70vh;
    display: flex;
    flex-direction: column;
    animation: slideUp .25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }
  .drawer-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-weight: 600;
  }
  .drawer-body { overflow-y: auto; padding: 16px 20px; flex: 1; }
  .run-log-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .run-log-table th {
    text-align: left;
    color: var(--muted);
    font-weight: 500;
    padding: 6px 8px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    text-transform: uppercase;
  }
  .run-log-table td { padding: 7px 8px; border-bottom: 1px solid rgba(51,65,85,.5); }
  .run-log-table tr:last-child td { border-bottom: none; }

  /* ── 编辑模态框 ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.6);
    z-index: 300;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    width: 100%;
    max-width: 560px;
    max-height: 90vh;
    overflow-y: auto;
    animation: fadeIn .2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: scale(.96); } to { opacity: 1; transform: scale(1); } }
  .modal-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-weight: 600;
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 1;
  }
  .modal-body { padding: 20px; }
  .modal-footer {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 10px;
  }

  /* ── 空状态 ── */
  .empty { text-align: center; padding: 40px 0; color: var(--muted); font-size: 13px; }
  .empty .empty-icon { font-size: 36px; margin-bottom: 10px; }

  /* ── Toast ── */
  #toast-container {
    position: fixed; bottom: 24px; right: 24px;
    display: flex; flex-direction: column; gap: 8px;
    z-index: 9999;
  }
  .toast {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 10px 16px;
    font-size: 13px;
    box-shadow: 0 8px 24px rgba(0,0,0,.4);
    animation: slideIn .2s ease;
    max-width: 320px;
  }
  .toast.ok  { border-left: 3px solid var(--green); }
  .toast.err { border-left: 3px solid var(--red); }
  .toast.warn { border-left: 3px solid var(--yellow); }
  @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* ── 分隔线 ── */
  .divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

  /* ── 全宽卡片 ── */
  .full-card { margin-bottom: 20px; }

  /* ── 帮助文字 ── */
  .help-text { font-size: 11px; color: var(--muted); margin-top: 3px; }
</style>
</head>
<body>

<!-- ── 顶栏 ── -->
<div class="topbar">
  <div class="topbar-brand">⏰ <span>GoQueue</span> Cron Dashboard</div>
  <div class="topbar-right">
    <span id="conn-label">
      <span class="conn-dot idle" id="conn-dot"></span>未连接
    </span>
  </div>
</div>

<div class="page">

  <!-- ── 配置栏 ── -->
  <div class="config-bar">
    <label>服务地址</label>
    <input id="cfg-server" type="text" value="https://24f7f8fe-1114-4510-9f39-bdbd913f8772.deepnoteproject.com" placeholder="http://localhost:8080">
    <label>API Token</label>
    <input id="cfg-token" type="text" value="secret" placeholder="Bearer token">
    <button class="btn btn-primary btn-sm" onclick="applyConfig()">应用配置</button>
    <button class="btn btn-ghost btn-sm" onclick="loadCrons()">🔄 刷新</button>
  </div>

  <!-- ── 统计行 ── -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">任务总数</div>
      <div class="stat-value cyan" id="stat-total">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">已启用</div>
      <div class="stat-value green" id="stat-enabled">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">已暂停</div>
      <div class="stat-value yellow" id="stat-disabled">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">本页触发</div>
      <div class="stat-value orange" id="stat-fired">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">本页跳过</div>
      <div class="stat-value purple" id="stat-skipped">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">本页过期</div>
      <div class="stat-value red" id="stat-expired">0</div>
    </div>
  </div>

  <!-- ── 两栏：创建表单 + 日志 ── -->
  <div class="layout">

    <!-- 左：创建定时任务 -->
    <div class="card">
      <div class="card-header">
        <h2>➕ 创建定时任务</h2>
      </div>
      <div class="card-body">

        <!-- 调度模式切换 -->
        <div class="schedule-tabs">
          <button class="schedule-tab active" id="tab-every" onclick="switchScheduleTab('every')">⏱ 间隔（every）</button>
          <button class="schedule-tab" id="tab-expr" onclick="switchScheduleTab('expr')">📅 Cron 表达式</button>
        </div>

        <div class="form-grid">
          <div class="field full">
            <label>任务名称</label>
            <input id="f-name" type="text" placeholder="例：每分钟心跳检测" value="每分钟心跳检测">
          </div>
          <div class="field">
            <label>队列名</label>
            <input id="f-queue" type="text" placeholder="default" value="default">
          </div>
          <div class="field">
            <label>Job Type</label>
            <input id="f-jobtype" type="text" placeholder="例：heartbeat" value="heartbeat">
          </div>

          <!-- every 模式 -->
          <div class="field" id="wrap-every">
            <label>执行间隔（every）</label>
            <select id="f-every">
              <option value="10s">每 10 秒</option>
              <option value="30s">每 30 秒</option>
              <option value="1m" selected>每 1 分钟</option>
              <option value="5m">每 5 分钟</option>
              <option value="15m">每 15 分钟</option>
              <option value="30m">每 30 分钟</option>
              <option value="1h">每 1 小时</option>
              <option value="6h">每 6 小时</option>
              <option value="1d">每 1 天</option>
              <option value="1w">每 1 周</option>
              <option value="custom">自定义…</option>
            </select>
          </div>
          <div class="field" id="wrap-every-custom" style="display:none">
            <label>自定义间隔</label>
            <input id="f-every-custom" type="text" placeholder="例：45s / 2h / 3d">
          </div>

          <!-- expr 模式 -->
          <div class="field" id="wrap-expr" style="display:none">
            <label>Cron 表达式（5 字段）</label>
            <input id="f-expr" type="text" placeholder="例：0 8 * * *（每天 8 点）">
            <div class="help-text">分 时 日 月 周 — 支持 * / , -</div>
          </div>
          <div class="field" id="wrap-tz" style="display:none">
            <label>时区</label>
            <input id="f-tz" type="text" placeholder="例：Asia/Shanghai（默认 UTC）">
          </div>

          <div class="field">
            <label>优先级（1-10）</label>
            <input id="f-priority" type="number" min="1" max="10" value="5">
          </div>
          <div class="field">
            <label>最大重试次数</label>
            <input id="f-maxattempts" type="number" min="1" max="20" value="3">
          </div>
          <div class="field full">
            <label>Tags（逗号分隔）</label>
            <input id="f-tags" type="text" placeholder="例：email,daily,infra">
          </div>
          <div class="field full">
            <label>任务数据（JSON）</label>
            <textarea id="f-data" placeholder='{"key":"value"}'>{}</textarea>
          </div>
          <div class="field">
            <label>最大触发次数（0=不限）</label>
            <input id="f-maxruns" type="number" min="0" value="0">
          </div>
          <div class="field">
            <label>到期时间（Unix 时间戳，0=不限）</label>
            <input id="f-expires" type="number" min="0" value="0">
          </div>
        </div>

        <!-- 布尔选项 -->
        <div class="check-row">
          <label class="check-item">
            <input type="checkbox" id="f-without-overlapping">
            防重叠（withoutOverlapping）
          </label>
          <label class="check-item">
            <input type="checkbox" id="f-one-time">
            单次触发（one_time）
          </label>
        </div>

        <!-- 快捷模板 -->
        <div class="tpl-row">
          <span style="font-size:11px;color:var(--muted);align-self:center">模板：</span>
          <button class="btn btn-ghost btn-sm" onclick="applyTemplate('everymin')">⚡ 每分钟(Cron)</button>
          <button class="btn btn-ghost btn-sm" onclick="applyTemplate('heartbeat')">💓 心跳</button>
          <button class="btn btn-ghost btn-sm" onclick="applyTemplate('report')">📊 报告</button>
          <button class="btn btn-ghost btn-sm" onclick="applyTemplate('cleanup')">🧹 清理</button>
          <button class="btn btn-ghost btn-sm" onclick="applyTemplate('sync')">🔄 同步</button>
          <button class="btn btn-ghost btn-sm" onclick="applyTemplate('notify')">🔔 通知</button>
          <button class="btn btn-ghost btn-sm" onclick="applyTemplate('daily8')">🌅 每天8点</button>
          <button class="btn btn-ghost btn-sm" onclick="applyTemplate('weekly')">📆 每周一</button>
        </div>

        <button class="btn btn-primary" style="width:100%" onclick="createCron()">
          ⏰ 创建定时任务
        </button>
      </div>
    </div>

    <!-- 右：实时触发日志 -->
    <div class="card">
      <div class="card-header">
        <h2>📋 实时触发日志</h2>
        <div style="display:flex;gap:8px;align-items:center">
          <span id="sse-badge" class="badge badge-gray">SSE 未连接</span>
          <button class="btn btn-ghost btn-sm" onclick="clearLog()">清空</button>
        </div>
      </div>
      <div class="card-body" style="padding:12px">
        <div class="log-box" id="log-box">
          <div class="log-line"><span class="log-time">--:--:--</span><span class="log-info">等待服务端事件…点击「应用配置」开始监听</span></div>
        </div>
      </div>
    </div>

  </div>

  <!-- ── 定时任务列表（全宽） ── -->
  <div class="full-card">
    <div class="card">
      <div class="card-header">
        <h2>📅 定时任务列表</h2>
        <div style="display:flex;gap:8px">
          <button class="btn btn-ghost btn-sm" onclick="loadCrons()">🔄 刷新</button>
          <button class="btn btn-danger btn-sm" onclick="deleteAllCrons()">🗑 全部删除</button>
        </div>
      </div>
      <div class="card-body">
        <div class="cron-list" id="cron-list">
          <div class="empty"><div class="empty-icon">📭</div>暂无定时任务，请先创建</div>
        </div>
      </div>
    </div>
  </div>

</div><!-- /page -->

<!-- ── Toast 容器 ── -->
<div id="toast-container"></div>

<!-- ── 触发历史抽屉 ── -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer(event)">
  <div class="drawer">
    <div class="drawer-header">
      <span id="drawer-title">触发历史</span>
      <button class="btn btn-ghost btn-sm" onclick="closeDrawerForce()">✕ 关闭</button>
    </div>
    <div class="drawer-body" id="drawer-body">
      <div class="empty"><div class="empty-icon">📭</div>暂无记录</div>
    </div>
  </div>
</div>

<!-- ── 编辑模态框 ── -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <span id="modal-title">编辑定时任务</span>
      <button class="btn btn-ghost btn-sm" onclick="closeModalForce()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModalForce()">取消</button>
      <button class="btn btn-primary" id="modal-save-btn" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  配置
// ═══════════════════════════════════════════════════════════════════
let SERVER  = 'https://24f7f8fe-1114-4510-9f39-bdbd913f8772.deepnoteproject.com';
let API_KEY = 'secret';
let pollTimer = null;
let sseSource = null;
let lastCronSnapshot = null;
let firedCount  = 0;
let skippedCount = 0;
let expiredCount = 0;
let editingCronId = null;
let scheduleMode = 'every'; // 'every' | 'expr'

// ═══════════════════════════════════════════════════════════════════
//  工具函数
// ═══════════════════════════════════════════════════════════════════
function headers() {
  const h = { 'Content-Type': 'application/json' };
  if (API_KEY) h['Authorization'] = `Bearer ${API_KEY}`;
  return h;
}

function toast(msg, type = 'ok') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function now() {
  return new Date().toLocaleTimeString('zh-CN', { hour12: false });
}

function addLog(text, cls = 'log-info') {
  const box = document.getElementById('log-box');
  const placeholder = box.querySelector('.log-line');
  if (placeholder && placeholder.querySelector('.log-info')?.textContent.startsWith('等待')) {
    placeholder.remove();
  }
  const line = document.createElement('div');
  line.className = 'log-line';
  line.innerHTML = `<span class="log-time">${now()}</span><span class="${cls}">${escHtml(text)}</span>`;
  box.appendChild(line);
  while (box.children.length > 300) box.removeChild(box.firstChild);
  box.scrollTop = box.scrollHeight;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function clearLog() {
  document.getElementById('log-box').innerHTML = '';
  addLog('日志已清空', 'log-info');
}

function fmtDuration(every) {
  const map = { s: '秒', m: '分钟', h: '小时', d: '天', w: '周' };
  const m = every.match(/^(\d+)([smhdw])$/);
  if (m) return `每 ${m[1]} ${map[m[2]] || m[2]}`;
  return `每 ${every}`;
}

function fmtTs(ts) {
  if (!ts || ts === 0) return '—';
  return new Date(ts * 1000).toLocaleString('zh-CN');
}

function fmtNextRun(ts) {
  if (!ts || ts === 0) return '—';
  const diff = ts - Math.floor(Date.now() / 1000);
  if (diff <= 0) return '即将触发';
  if (diff < 60) return `${diff}s 后`;
  if (diff < 3600) return `${Math.floor(diff/60)}m 后`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h 后`;
  return `${Math.floor(diff/86400)}d 后`;
}

function fmtSchedule(c) {
  if (c.expr) {
    const tz = c.timezone ? ` (${c.timezone})` : '';
    return `📅 ${c.expr}${tz}`;
  }
  if (c.every) return `⏱ ${fmtDuration(c.every)}`;
  return '—';
}

// ═══════════════════════════════════════════════════════════════════
//  调度模式切换
// ═══════════════════════════════════════════════════════════════════
function switchScheduleTab(mode) {
  scheduleMode = mode;
  document.getElementById('tab-every').classList.toggle('active', mode === 'every');
  document.getElementById('tab-expr').classList.toggle('active', mode === 'expr');
  document.getElementById('wrap-every').style.display = mode === 'every' ? '' : 'none';
  document.getElementById('wrap-every-custom').style.display =
    (mode === 'every' && document.getElementById('f-every').value === 'custom') ? '' : 'none';
  document.getElementById('wrap-expr').style.display = mode === 'expr' ? '' : 'none';
  document.getElementById('wrap-tz').style.display   = mode === 'expr' ? '' : 'none';
}

// ═══════════════════════════════════════════════════════════════════
//  配置 & 连接
// ═══════════════════════════════════════════════════════════════════
function applyConfig() {
  SERVER  = document.getElementById('cfg-server').value.replace(/\/$/, '');
  API_KEY = document.getElementById('cfg-token').value;
  setConnStatus('idle', '连接中…');
  loadCrons();
  startSSE();
  startPoll();
}

function setConnStatus(state, label) {
  const dot = document.getElementById('conn-dot');
  const lbl = document.getElementById('conn-label');
  dot.className = `conn-dot ${state}`;
  lbl.innerHTML = `<span class="conn-dot ${state}" id="conn-dot"></span>${escHtml(label)}`;
}

// ═══════════════════════════════════════════════════════════════════
//  SSE
// ═══════════════════════════════════════════════════════════════════
function startSSE() {
  if (sseSource) { sseSource.close(); sseSource = null; }
  const url = `${SERVER}/events?token=${encodeURIComponent(API_KEY)}`;
  sseSource = new EventSource(url);
  sseSource.onopen = () => {
    document.getElementById('sse-badge').className = 'badge badge-green';
    document.getElementById('sse-badge').textContent = '● SSE 已连接';
    setConnStatus('ok', '已连接');
    addLog('SSE 连接成功', 'log-ok');
  };
  sseSource.onmessage = (e) => {
    try {
      const d = JSON.parse(e.data);
      if (d.type === 'job_done' || d.type === 'job_failed') {
        const cls = d.type === 'job_done' ? 'log-ok' : 'log-err';
        addLog(`[SSE] ${d.type} job#${d.job_id} queue=${d.queue}`, cls);
      }
    } catch (_) {}
  };
  sseSource.onerror = () => {
    document.getElementById('sse-badge').className = 'badge badge-red';
    document.getElementById('sse-badge').textContent = '● SSE 断开';
    setConnStatus('err', 'SSE 断开');
  };
}

// ═══════════════════════════════════════════════════════════════════
//  轮询
// ═══════════════════════════════════════════════════════════════════
function startPoll() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(loadCrons, 5000);
}

// ═══════════════════════════════════════════════════════════════════
//  加载 & 渲染
// ═══════════════════════════════════════════════════════════════════
async function loadCrons(silent = false) {
  try {
    const res = await fetch(`${SERVER}/api/crons`, { headers: headers() });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const crons = await res.json();
    renderCrons(crons, silent);
    updateStats(crons);
    if (!silent) setConnStatus('ok', '已连接');
  } catch (e) {
    if (!silent) {
      setConnStatus('err', '连接失败');
      addLog(`加载失败: ${e.message}`, 'log-err');
    }
  }
}

function updateStats(crons) {
  document.getElementById('stat-total').textContent    = crons.length;
  document.getElementById('stat-enabled').textContent  = crons.filter(c => c.enabled).length;
  document.getElementById('stat-disabled').textContent = crons.filter(c => !c.enabled).length;
  document.getElementById('stat-fired').textContent    = firedCount;
  document.getElementById('stat-skipped').textContent  = skippedCount;
  document.getElementById('stat-expired').textContent  = expiredCount;
}

function renderCrons(crons, silent) {
  const list = document.getElementById('cron-list');

  // 检测触发（last_run_at 变化）
  const snapshot = JSON.stringify(crons.map(c => ({ id: c.id, last: c.last_run_at, rc: c.run_count, en: c.enabled })));
  if (lastCronSnapshot && snapshot !== lastCronSnapshot) {
    const prev = JSON.parse(lastCronSnapshot);
    crons.forEach(c => {
      const p = prev.find(x => x.id === c.id);
      if (p && c.last_run_at > p.last) {
        firedCount++;
        addLog(`⏰ Cron #${c.id} [${c.job_type}] 触发 → 上次: ${fmtTs(c.last_run_at)} (run_count=${c.run_count})`, 'log-ok');
        // 闪烁动画
        const el = document.getElementById(`cron-item-${c.id}`);
        if (el) { el.classList.remove('fired'); void el.offsetWidth; el.classList.add('fired'); }
      }
      // 检测 disabled（one_time / max_runs / expires_at）
      if (p && p.en && !c.enabled) {
        addLog(`⏸ Cron #${c.id} [${c.job_type}] 已自动禁用`, 'log-warn');
      }
    });
  }
  lastCronSnapshot = snapshot;

  if (!crons.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>暂无定时任务，请先创建</div>';
    return;
  }

  list.innerHTML = crons.map(c => {
    const enabled = c.enabled;
    const statusBadge = enabled
      ? '<span class="badge badge-green">● 运行中</span>'
      : '<span class="badge badge-yellow">⏸ 已暂停</span>';

    const scheduleBadge = c.expr
      ? `<span class="badge badge-cyan">📅 Cron</span>`
      : `<span class="badge badge-gray">⏱ Every</span>`;

    const featureBadges = [
      c.without_overlapping ? '<span class="badge badge-purple">防重叠</span>' : '',
      c.one_time            ? '<span class="badge badge-orange">单次</span>'   : '',
      c.max_runs > 0        ? `<span class="badge badge-gray">限${c.max_runs}次</span>` : '',
      c.expires_at > 0      ? '<span class="badge badge-red">有效期</span>'   : '',
    ].filter(Boolean).join('');

    const tagsHtml = (c.tags && c.tags.length)
      ? `<div class="cron-tags">${c.tags.map(t => `<span class="tag-chip">${escHtml(t)}</span>`).join('')}</div>`
      : '';

    // max_runs 进度条
    let progressHtml = '';
    if (c.max_runs > 0) {
      const pct = Math.min(100, Math.round(c.run_count / c.max_runs * 100));
      progressHtml = `
        <div class="progress-bar-wrap" title="${c.run_count}/${c.max_runs} 次">
          <div class="progress-bar" style="width:${pct}%"></div>
        </div>`;
    }

    return `
    <div class="cron-item${enabled ? '' : ' disabled'}" id="cron-item-${c.id}">
      <div class="cron-top">
        <div class="cron-title">
          ${statusBadge}
          ${scheduleBadge}
          ${escHtml(c.name || c.job_type)}
          <span class="cron-id">#${c.id}</span>
          ${featureBadges}
        </div>
        <div class="cron-actions">
          <button class="btn btn-ghost btn-icon" title="立即触发" onclick="triggerCron(${c.id},'${escHtml(c.job_type)}')">▶</button>
          <button class="btn btn-ghost btn-icon" title="触发历史" onclick="showLogs(${c.id},'${escHtml(c.name||c.job_type)}')">📜</button>
          <button class="btn btn-ghost btn-icon" title="编辑" onclick="editCron(${c.id})">✏️</button>
          <button class="btn btn-ghost btn-icon" title="${enabled ? '暂停' : '恢复'}" onclick="toggleCron(${c.id},${enabled})">
            ${enabled ? '⏸' : '▶️'}
          </button>
          <button class="btn btn-ghost btn-icon" title="删除" onclick="deleteCron(${c.id})">🗑</button>
        </div>
      </div>

      <div class="cron-meta">
        <span>🔧 <span class="val">${escHtml(c.job_type)}</span></span>
        <span>📬 <span class="val">${escHtml(c.queue)}</span></span>
        <span>📐 <span class="val">${fmtSchedule(c)}</span></span>
        <span>⏭ 下次: <span class="val">${fmtNextRun(c.next_run_at)}</span></span>
        <span>🕐 上次: <span class="val">${fmtTs(c.last_run_at)}</span></span>
        <span>🔢 触发: <span class="val">${c.run_count}${c.max_runs > 0 ? ' / ' + c.max_runs : ''}</span></span>
        <span>⚡ 优先级: <span class="val">${c.priority}</span></span>
        <span>🔁 重试: <span class="val">${c.max_attempts}</span></span>
        ${c.expires_at > 0 ? `<span>⏳ 到期: <span class="val">${fmtTs(c.expires_at)}</span></span>` : ''}
      </div>

      ${tagsHtml}

      <div class="cron-footer">
        <span>创建于 ${fmtTs(c.created_at)}</span>
        ${progressHtml}
        ${c.without_overlapping ? '<span style="color:var(--purple)">🔒 防重叠已开启</span>' : ''}
      </div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════════════
//  创建
// ═══════════════════════════════════════════════════════════════════
async function createCron() {
  const name     = document.getElementById('f-name').value.trim();
  const queue    = document.getElementById('f-queue').value.trim() || 'default';
  const jobType  = document.getElementById('f-jobtype').value.trim();
  const priority = parseInt(document.getElementById('f-priority').value) || 5;
  const maxAttempts = parseInt(document.getElementById('f-maxattempts').value) || 3;
  const maxRuns  = parseInt(document.getElementById('f-maxruns').value) || 0;
  const expires  = parseInt(document.getElementById('f-expires').value) || 0;
  const withoutOverlapping = document.getElementById('f-without-overlapping').checked;
  const oneTime  = document.getElementById('f-one-time').checked;
  const tagsRaw  = document.getElementById('f-tags').value.trim();
  const tags     = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];

  let dataObj = {};
  try { dataObj = JSON.parse(document.getElementById('f-data').value || '{}'); } catch (_) {}

  if (!jobType) { toast('请填写 Job Type', 'err'); return; }

  const body = {
    name, queue, job_type: jobType,
    data: dataObj,
    priority, max_attempts: maxAttempts,
    tags, without_overlapping: withoutOverlapping,
    one_time: oneTime, max_runs: maxRuns, expires_at: expires,
  };

  if (scheduleMode === 'every') {
    let every = document.getElementById('f-every').value;
    if (every === 'custom') every = document.getElementById('f-every-custom').value.trim();
    if (!every) { toast('请填写执行间隔', 'err'); return; }
    body.every = every;
  } else {
    const expr = document.getElementById('f-expr').value.trim();
    const tz   = document.getElementById('f-tz').value.trim();
    if (!expr) { toast('请填写 Cron 表达式', 'err'); return; }
    body.expr = expr;
    if (tz) body.timezone = tz;
  }

  try {
    const res = await fetch(`${SERVER}/api/crons`, {
      method: 'POST', headers: headers(), body: JSON.stringify(body),
    });
    const json = await res.json();
    if (!res.ok) throw new Error(json.error || `HTTP ${res.status}`);
    toast(`✅ 创建成功 #${json.id}`, 'ok');
    addLog(`创建 Cron #${json.id} [${jobType}] ${body.every || body.expr} next=${fmtTs(json.next_run_at)}`, 'log-ok');
    loadCrons();
  } catch (e) {
    toast(`创建失败: ${e.message}`, 'err');
    addLog(`创建失败: ${e.message}`, 'log-err');
  }
}

// ═══════════════════════════════════════════════════════════════════
//  立即触发
// ═══════════════════════════════════════════════════════════════════
async function triggerCron(id, jobType) {
  try {
    const res = await fetch(`${SERVER}/api/crons/${id}/trigger`, {
      method: 'POST', headers: headers(),
    });
    const json = await res.json();
    if (!res.ok) throw new Error(json.error || `HTTP ${res.status}`);
    toast(`▶ 已触发 Cron #${id} → job #${json.job_id}`, 'ok');
    addLog(`▶ 手动触发 Cron #${id} [${jobType}] → job #${json.job_id}`, 'log-ok');
    firedCount++;
    document.getElementById('stat-fired').textContent = firedCount;
  } catch (e) {
    toast(`触发失败: ${e.message}`, 'err');
    addLog(`触发失败: ${e.message}`, 'log-err');
  }
}

// ═══════════════════════════════════════════════════════════════════
//  暂停 / 恢复
// ═══════════════════════════════════════════════════════════════════
async function toggleCron(id, currentEnabled) {
  try {
    const res = await fetch(`${SERVER}/api/crons/${id}`, {
      method: 'PATCH', headers: headers(),
      body: JSON.stringify({ enabled: !currentEnabled }),
    });
    const json = await res.json();
    if (!res.ok) throw new Error(json.error || `HTTP ${res.status}`);
    toast(currentEnabled ? `⏸ Cron #${id} 已暂停` : `▶ Cron #${id} 已恢复`, 'ok');
    addLog(currentEnabled ? `⏸ 暂停 Cron #${id}` : `▶ 恢复 Cron #${id}`, 'log-info');
    loadCrons(true);
  } catch (e) {
    toast(`操作失败: ${e.message}`, 'err');
  }
}

// ═══════════════════════════════════════════════════════════════════
//  删除
// ═══════════════════════════════════════════════════════════════════
async function deleteCron(id) {
  if (!confirm(`确认删除 Cron #${id}？此操作同时清除触发历史。`)) return;
  try {
    const res = await fetch(`${SERVER}/api/crons/${id}`, {
      method: 'DELETE', headers: headers(),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    toast(`🗑 Cron #${id} 已删除`, 'ok');
    addLog(`🗑 删除 Cron #${id}`, 'log-warn');
    loadCrons(true);
  } catch (e) {
    toast(`删除失败: ${e.message}`, 'err');
  }
}

async function deleteAllCrons() {
  if (!confirm('确认删除所有定时任务？')) return;
  try {
    const res = await fetch(`${SERVER}/api/crons`, { headers: headers() });
    const crons = await res.json();
    await Promise.all(crons.map(c =>
      fetch(`${SERVER}/api/crons/${c.id}`, { method: 'DELETE', headers: headers() })
    ));
    toast('🗑 全部删除完成', 'ok');
    addLog('🗑 全部定时任务已删除', 'log-warn');
    loadCrons(true);
  } catch (e) {
    toast(`删除失败: ${e.message}`, 'err');
  }
}

// ═══════════════════════════════════════════════════════════════════
//  触发历史抽屉
// ═══════════════════════════════════════════════════════════════════
async function showLogs(cronId, cronName) {
  document.getElementById('drawer-title').textContent = `📜 触发历史 — ${cronName} (#${cronId})`;
  document.getElementById('drawer-body').innerHTML = '<div class="empty"><div class="empty-icon">⏳</div>加载中…</div>';
  document.getElementById('drawer-overlay').classList.add('open');

  try {
    const res = await fetch(`${SERVER}/api/crons/${cronId}/logs?limit=100`, { headers: headers() });
    const logs = await res.json();
    renderRunLogs(logs);
  } catch (e) {
    document.getElementById('drawer-body').innerHTML = `<div class="empty"><div class="empty-icon">❌</div>${escHtml(e.message)}</div>`;
  }
}

function renderRunLogs(logs) {
  if (!logs || !logs.length) {
    document.getElementById('drawer-body').innerHTML = '<div class="empty"><div class="empty-icon">📭</div>暂无触发记录</div>';
    return;
  }
  const rows = logs.map(l => {
    const skipBadge = l.skipped
      ? `<span class="badge badge-yellow">跳过</span> <span style="color:var(--muted);font-size:11px">${escHtml(l.skip_reason)}</span>`
      : `<span class="badge badge-green">触发</span>`;
    const jobLink = l.job_id > 0
      ? `<span style="color:var(--cyan)">#${l.job_id}</span>`
      : '—';
    return `<tr>
      <td>${l.id}</td>
      <td>${fmtTs(l.fired_at)}</td>
      <td>${skipBadge}</td>
      <td>${jobLink}</td>
    </tr>`;
  }).join('');

  document.getElementById('drawer-body').innerHTML = `
    <table class="run-log-table">
      <thead><tr><th>Log ID</th><th>触发时间</th><th>状态</th><th>Job ID</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function closeDrawer(e) {
  if (e.target === document.getElementById('drawer-overlay')) closeDrawerForce();
}
function closeDrawerForce() {
  document.getElementById('drawer-overlay').classList.remove('open');
}

// ═══════════════════════════════════════════════════════════════════
//  编辑模态框
// ═══════════════════════════════════════════════════════════════════
async function editCron(id) {
  editingCronId = id;
  document.getElementById('modal-title').textContent = `✏️ 编辑 Cron #${id}`;
  document.getElementById('modal-body').innerHTML = '<div class="empty"><div class="empty-icon">⏳</div>加载中…</div>';
  document.getElementById('modal-overlay').classList.add('open');

  try {
    const res = await fetch(`${SERVER}/api/crons/${id}`, { headers: headers() });
    const c = await res.json();
    renderEditForm(c);
  } catch (e) {
    document.getElementById('modal-body').innerHTML = `<div class="empty"><div class="empty-icon">❌</div>${escHtml(e.message)}</div>`;
  }
}

function renderEditForm(c) {
  const isExpr = !!c.expr;
  document.getElementById('modal-body').innerHTML = `
    <div class="schedule-tabs" style="margin-bottom:14px">
      <button class="schedule-tab${!isExpr ? ' active' : ''}" id="etab-every" onclick="switchEditTab('every')">⏱ 间隔（every）</button>
      <button class="schedule-tab${isExpr ? ' active' : ''}" id="etab-expr" onclick="switchEditTab('expr')">📅 Cron 表达式</button>
    </div>
    <div class="form-grid">
      <div class="field full">
        <label>任务名称</label>
        <input id="e-name" type="text" value="${escHtml(c.name)}">
      </div>
      <div class="field">
        <label>队列名</label>
        <input id="e-queue" type="text" value="${escHtml(c.queue)}">
      </div>
      <div class="field">
        <label>Job Type</label>
        <input id="e-jobtype" type="text" value="${escHtml(c.job_type)}">
      </div>

      <div class="field" id="ewrap-every" style="display:${!isExpr ? '' : 'none'}">
        <label>执行间隔（every）</label>
        <input id="e-every" type="text" value="${escHtml(c.every)}" placeholder="例：1m / 30s / 1h">
      </div>
      <div class="field" id="ewrap-expr" style="display:${isExpr ? '' : 'none'}">
        <label>Cron 表达式</label>
        <input id="e-expr" type="text" value="${escHtml(c.expr)}" placeholder="* * * * *">
      </div>
      <div class="field" id="ewrap-tz" style="display:${isExpr ? '' : 'none'}">
        <label>时区</label>
        <input id="e-tz" type="text" value="${escHtml(c.timezone)}" placeholder="Asia/Shanghai">
      </div>

      <div class="field">
        <label>优先级（1-10）</label>
        <input id="e-priority" type="number" min="1" max="10" value="${c.priority}">
      </div>
      <div class="field">
        <label>最大重试次数</label>
        <input id="e-maxattempts" type="number" min="1" max="20" value="${c.max_attempts}">
      </div>
      <div class="field full">
        <label>Tags（逗号分隔）</label>
        <input id="e-tags" type="text" value="${escHtml((c.tags||[]).filter(t => !t.startsWith('cron:')).join(','))}">
      </div>
      <div class="field full">
        <label>任务数据（JSON）</label>
        <textarea id="e-data">${escHtml(c.data || '{}')}</textarea>
      </div>
      <div class="field">
        <label>最大触发次数（0=不限）</label>
        <input id="e-maxruns" type="number" min="0" value="${c.max_runs}">
      </div>
      <div class="field">
        <label>到期时间（Unix，0=不限）</label>
        <input id="e-expires" type="number" min="0" value="${c.expires_at}">
      </div>
    </div>
    <div class="check-row">
      <label class="check-item">
        <input type="checkbox" id="e-without-overlapping" ${c.without_overlapping ? 'checked' : ''}>
        防重叠（withoutOverlapping）
      </label>
      <label class="check-item">
        <input type="checkbox" id="e-one-time" ${c.one_time ? 'checked' : ''}>
        单次触发（one_time）
      </label>
    </div>`;
}

function switchEditTab(mode) {
  document.getElementById('etab-every').classList.toggle('active', mode === 'every');
  document.getElementById('etab-expr').classList.toggle('active', mode === 'expr');
  document.getElementById('ewrap-every').style.display = mode === 'every' ? '' : 'none';
  document.getElementById('ewrap-expr').style.display  = mode === 'expr'  ? '' : 'none';
  document.getElementById('ewrap-tz').style.display    = mode === 'expr'  ? '' : 'none';
}

async function saveEdit() {
  const id = editingCronId;
  if (!id) return;

  const isExpr = document.getElementById('etab-expr')?.classList.contains('active');
  const tagsRaw = document.getElementById('e-tags').value.trim();
  const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];

  let dataObj = {};
  try { dataObj = JSON.parse(document.getElementById('e-data').value || '{}'); } catch (_) {}

  const body = {
    name:               document.getElementById('e-name').value.trim(),
    queue:              document.getElementById('e-queue').value.trim() || 'default',
    job_type:           document.getElementById('e-jobtype').value.trim(),
    data:               dataObj,
    priority:           parseInt(document.getElementById('e-priority').value) || 5,
    max_attempts:       parseInt(document.getElementById('e-maxattempts').value) || 3,
    tags,
    without_overlapping: document.getElementById('e-without-overlapping').checked,
    one_time:           document.getElementById('e-one-time').checked,
    max_runs:           parseInt(document.getElementById('e-maxruns').value) || 0,
    expires_at:         parseInt(document.getElementById('e-expires').value) || 0,
  };

  if (isExpr) {
    body.expr     = document.getElementById('e-expr').value.trim();
    body.timezone = document.getElementById('e-tz').value.trim();
    body.every    = '';
  } else {
    body.every = document.getElementById('e-every').value.trim();
    body.expr  = '';
  }

  try {
    const res = await fetch(`${SERVER}/api/crons/${id}`, {
      method: 'PUT', headers: headers(), body: JSON.stringify(body),
    });
    const json = await res.json();
    if (!res.ok) throw new Error(json.error || `HTTP ${res.status}`);
    toast(`✅ Cron #${id} 已更新`, 'ok');
    addLog(`✏️ 更新 Cron #${id} next_run_at=${fmtTs(json.next_run_at)}`, 'log-info');
    closeModalForce();
    loadCrons(true);
  } catch (e) {
    toast(`保存失败: ${e.message}`, 'err');
  }
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModalForce();
}
function closeModalForce() {
  document.getElementById('modal-overlay').classList.remove('open');
  editingCronId = null;
}

// ═══════════════════════════════════════════════════════════════════
//  快捷模板
// ═══════════════════════════════════════════════════════════════════
const TEMPLATES = {
  everymin:  { name: '每分钟示例（Cron）', jobType: 'ping', expr: '* * * * *', tags: 'demo,infra', data: '{"msg":"tick"}' },
  heartbeat: { name: '心跳检测',   jobType: 'heartbeat', every: '1m',  tags: 'infra',       data: '{}', withoutOverlapping: true  },
  report:    { name: '生成报告',   jobType: 'generate_report', expr: '0 8 * * *', tz: 'Asia/Shanghai', tags: 'report,daily', data: '{"format":"pdf"}' },
  cleanup:   { name: '数据清理',   jobType: 'cleanup_old_data', every: '1d', tags: 'maintenance', data: '{"days":30}', withoutOverlapping: true },
  sync:      { name: '数据同步',   jobType: 'sync_data', every: '5m',  tags: 'sync',         data: '{"source":"remote"}' },
  notify:    { name: '定时通知',   jobType: 'send_notification', every: '30m', tags: 'notify', data: '{"channel":"slack"}' },
  daily8:    { name: '每天8点任务', jobType: 'daily_task', expr: '0 8 * * *', tz: 'Asia/Shanghai', tags: 'daily', data: '{}' },
  weekly:    { name: '每周一任务', jobType: 'weekly_task', expr: '0 9 * * 1', tz: 'Asia/Shanghai', tags: 'weekly', data: '{}' },
};

function applyTemplate(key) {
  const t = TEMPLATES[key];
  if (!t) return;
  document.getElementById('f-name').value    = t.name;
  document.getElementById('f-jobtype').value = t.jobType;
  document.getElementById('f-tags').value    = t.tags || '';
  document.getElementById('f-data').value    = t.data || '{}';
  document.getElementById('f-without-overlapping').checked = !!t.withoutOverlapping;
  document.getElementById('f-one-time').checked = !!t.oneTime;

  if (t.expr) {
    switchScheduleTab('expr');
    document.getElementById('f-expr').value = t.expr;
    document.getElementById('f-tz').value   = t.tz || '';
  } else {
    switchScheduleTab('every');
    const sel = document.getElementById('f-every');
    const opt = Array.from(sel.options).find(o => o.value === t.every);
    if (opt) {
      sel.value = t.every;
      document.getElementById('wrap-every-custom').style.display = 'none';
    } else {
      sel.value = 'custom';
      document.getElementById('wrap-every-custom').style.display = '';
      document.getElementById('f-every-custom').value = t.every;
    }
  }
  toast(`已应用模板：${t.name}`, 'ok');
}

// ═══════════════════════════════════════════════════════════════════
//  事件绑定
// ═══════════════════════════════════════════════════════════════════
document.getElementById('f-every').addEventListener('change', function () {
  document.getElementById('wrap-every-custom').style.display =
    this.value === 'custom' ? '' : 'none';
});

// 页面加载时自动尝试连接
window.addEventListener('DOMContentLoaded', () => {
  addLog('页面已加载，点击「应用配置」连接服务端', 'log-info');
});
</script>
